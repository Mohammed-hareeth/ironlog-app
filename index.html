<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>IRONLOG</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16140f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg: #16140f;
    --bg-raised: #1f1c15;
    --bg-card: #211e17;
    --line: #34302470;
    --paper: #f4f1e8;
    --paper-dim: #cfc9b6;
    --rust: #c2542f;
    --rust-dim: #8a3c22;
    --olive: #8a9a5b;
    --warn: #d6483f;
    --radius: 2px;
    --font-display: 'Oswald', 'Arial Narrow', sans-serif;
    --font-body: 'Inter', -apple-system, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; }
  body{
    background: var(--bg);
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, #ffffff03 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, #ffffff02 40px);
    color: var(--paper);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  @font-face {
    font-family: 'Oswald';
    src: local('Oswald');
  }

  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display:flex; flex-direction:column; position:relative; }

  /* ---------- HEADER ---------- */
  header.topbar{
    padding: 18px 20px 14px;
    display:flex; align-items:baseline; justify-content:space-between;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, #1a1812, transparent);
  }
  .brand{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 26px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--paper);
  }
  .brand span{ color: var(--rust); }
  .brand-sub{
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--paper-dim);
    text-transform: uppercase;
    margin-top: 2px;
  }
  .date-stamp{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--paper-dim);
    text-align:right;
    line-height:1.5;
  }
  .date-stamp b{ color: var(--rust); display:block; font-size:13px; }

  /* ---------- NAV ---------- */
  nav.tabs{
    display:flex;
    border-bottom: 1px solid var(--line);
    position: sticky; top:0; z-index:50;
    background: var(--bg);
  }
  nav.tabs button{
    flex:1; padding: 13px 0;
    background:none; border:none;
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--paper-dim);
    border-bottom: 2px solid transparent;
    cursor:pointer;
  }
  nav.tabs button.active{
    color: var(--paper);
    border-bottom-color: var(--rust);
  }

  main{ flex:1; padding: 18px 18px 100px; }

  .section-label{
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--rust);
    margin: 0 0 10px;
    display:flex; align-items:center; gap:8px;
  }
  .section-label::after{ content:''; flex:1; height:1px; background: var(--line); }

  /* ---------- EMPTY STATE ---------- */
  .empty{
    text-align:center;
    padding: 50px 20px;
    color: var(--paper-dim);
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    font-size: 13px;
    line-height:1.6;
  }
  .empty b{ display:block; color: var(--paper); font-family: var(--font-display); font-size:16px; letter-spacing:0.5px; text-transform:uppercase; margin-bottom:6px;}

  /* ---------- LOG ENTRY CARD ---------- */
  .entry-card{
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-left: 3px solid var(--rust-dim);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .entry-head{
    display:flex; gap:12px; padding: 12px 14px;
    cursor:pointer;
  }
  .entry-photo{
    width: 52px; height: 52px; flex-shrink:0;
    border-radius: var(--radius);
    background: var(--bg-raised);
    object-fit: cover;
    border: 1px solid var(--line);
  }
  .entry-photo.placeholder{
    display:flex; align-items:center; justify-content:center;
    font-size: 20px; color: var(--line);
  }
  .entry-info{ flex:1; min-width:0; }
  .entry-name{
    font-family: var(--font-display);
    font-weight:600;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    color: var(--paper);
    white-space: nowrap; overflow:hidden; text-overflow: ellipsis;
  }
  .entry-meta{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--paper-dim);
    margin-top: 4px;
    display:flex; gap:10px;
  }
  .entry-meta b{ color: var(--olive); font-weight:600; }
  .entry-date{
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--paper-dim);
    text-align:right;
    align-self:flex-start;
    white-space:nowrap;
  }
  .entry-detail{
    border-top: 1px solid var(--line);
    padding: 12px 14px 14px;
    display:none;
  }
  .entry-detail.open{ display:block; }
  .set-row{
    display:flex; align-items:center;
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 6px 0;
    border-bottom: 1px solid #ffffff08;
    color: var(--paper-dim);
  }
  .set-row:last-child{ border-bottom:none; }
  .set-num{ width:46px; color: var(--rust); font-weight:600; }
  .set-val{ flex:1; }
  .set-val b{ color:var(--paper); }
  .entry-actions{ display:flex; gap:10px; margin-top: 12px; }
  .entry-actions button{
    flex:1;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 9px 0;
    border-radius: var(--radius);
    border: 1px solid var(--line);
    background: transparent;
    color: var(--paper-dim);
    cursor:pointer;
  }
  .entry-actions button.danger{ color: var(--warn); border-color: #d6483f40; }

  /* ---------- FAB ---------- */
  .fab{
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    width: min(444px, calc(100% - 36px));
    background: var(--rust);
    color: #1a1209;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-align:center;
    padding: 16px 0;
    border-radius: var(--radius);
    border: none;
    box-shadow: 0 8px 24px #0008, 0 0 0 1px #00000030;
    cursor:pointer;
    z-index: 60;
  }
  .fab:active{ transform: translateX(-50%) scale(0.98); }

  /* ---------- FORM SHEET ---------- */
  .sheet-overlay{
    position: fixed; inset:0;
    background: #0a0905d0;
    z-index: 100;
    display:none;
    align-items:flex-end;
    backdrop-filter: blur(2px);
  }
  .sheet-overlay.open{ display:flex; }
  .sheet{
    background: var(--bg-raised);
    border-top: 1px solid var(--line);
    border-radius: 16px 16px 0 0;
    width:100%;
    max-width: 480px;
    margin: 0 auto;
    max-height: 92vh;
    overflow-y:auto;
    padding: 8px 20px 28px;
    animation: slideUp 0.25s ease-out;
  }
  @keyframes slideUp{ from{ transform: translateY(40px); opacity:0;} to{ transform:translateY(0); opacity:1;} }
  .sheet-handle{ width:36px; height:4px; background: var(--line); border-radius:4px; margin: 10px auto 18px; }
  .sheet-title{
    font-family: var(--font-display);
    font-size: 20px; text-transform:uppercase; letter-spacing:0.5px;
    margin-bottom: 18px; color: var(--paper);
  }

  label.field-label{
    display:block;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--paper-dim);
    margin: 16px 0 7px;
  }
  input[type=text], input[type=number], input[type=date]{
    width:100%;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--paper);
    font-family: var(--font-body);
    font-size: 15px;
    padding: 12px 12px;
  }
  input:focus{ outline: 1px solid var(--rust); border-color: var(--rust); }

  /* photo upload */
  .photo-upload{
    display:flex; align-items:center; gap:14px;
    margin-top: 6px;
  }
  .photo-preview{
    width: 72px; height:72px;
    border-radius: var(--radius);
    border: 1px dashed var(--line);
    background: var(--bg-card);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; flex-shrink:0;
    color: var(--paper-dim);
    font-size: 22px;
    cursor:pointer;
  }
  .photo-preview img{ width:100%; height:100%; object-fit:cover; }
  .photo-upload-text{
    font-size: 12px; color: var(--paper-dim); line-height:1.5;
  }
  .photo-upload-text button{
    background:none; border:none; color: var(--rust);
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing:1px; text-transform:uppercase;
    padding:0; margin-top:4px; cursor:pointer;
  }

  /* sets builder */
  .sets-builder{ margin-top: 6px; }
  .set-builder-row{
    display:flex; align-items:center; gap:8px;
    margin-bottom: 8px;
  }
  .set-builder-row .set-tag{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--rust);
    width: 38px;
    flex-shrink:0;
  }
  .set-builder-row input{ flex:1; padding: 10px; font-size:14px; }
  .set-builder-row .unit{
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--paper-dim);
    width: 30px;
  }
  .set-builder-row .remove-set{
    background:none; border:none; color: var(--paper-dim);
    font-size: 18px; padding: 0 4px; cursor:pointer; flex-shrink:0;
  }
  .add-set-btn{
    width:100%;
    background: transparent;
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    color: var(--olive);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 11px 0;
    cursor:pointer;
    margin-top: 4px;
  }

  .sheet-buttons{ display:flex; gap:10px; margin-top: 22px; }
  .sheet-buttons button{
    flex:1;
    font-family: var(--font-display);
    font-weight:600;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 14px 0;
    border-radius: var(--radius);
    border: none;
    cursor:pointer;
  }
  .btn-save{ background: var(--rust); color:#1a1209; }
  .btn-cancel{ background: transparent; color: var(--paper-dim); border: 1px solid var(--line) !important; }

  /* ---------- HISTORY FILTER ---------- */
  .search-bar{
    width:100%;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--paper);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 11px 12px;
    margin-bottom: 16px;
  }

  /* ---------- PROGRESS ---------- */
  .exercise-pick{
    display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px;
  }
  .exercise-pick button{
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 8px 12px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--paper-dim);
    cursor:pointer;
  }
  .exercise-pick button.active{
    color: var(--bg); background: var(--olive); border-color: var(--olive);
  }
  .progress-stats{
    display:flex; gap:10px; margin-bottom: 18px;
  }
  .stat-box{
    flex:1;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px;
    text-align:center;
  }
  .stat-box .num{
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--rust);
    display:block;
  }
  .stat-box .lbl{
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--paper-dim);
    text-transform: uppercase;
    margin-top: 3px;
  }
  svg.chart{ width:100%; height: 160px; overflow: visible; }

  /* ---------- SETTINGS / BACKUP ---------- */
  .settings-row{
    display:flex; justify-content:space-between; align-items:center;
    padding: 14px 0;
    border-bottom: 1px solid var(--line);
  }
  .settings-row .lbl{ font-size: 14px; color: var(--paper); }
  .settings-row .desc{ font-size: 11px; color: var(--paper-dim); margin-top:2px; }
  .settings-row button{
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--bg-card);
    border: 1px solid var(--line);
    color: var(--paper);
    padding: 9px 14px;
    border-radius: var(--radius);
    cursor:pointer;
    white-space:nowrap;
  }
  input[type=file]{ display:none; }

  .toast{
    position: fixed; bottom: 100px; left:50%; transform: translateX(-50%);
    background: var(--paper); color: #1a1812;
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 10px 18px;
    border-radius: var(--radius);
    z-index: 200;
    opacity:0; pointer-events:none;
    transition: opacity 0.25s, transform 0.25s;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(-6px); }

  ::-webkit-scrollbar{ width:0; height:0; }
</style>
</head>
<body>
<div id="app">

  <header class="topbar">
    <div>
      <div class="brand">IRON<span>LOG</span></div>
      <div class="brand-sub">personal training ledger</div>
    </div>
    <div class="date-stamp" id="headerDate"></div>
  </header>

  <nav class="tabs">
    <button data-tab="log" class="active">Log</button>
    <button data-tab="history">History</button>
    <button data-tab="progress">Progress</button>
    <button data-tab="settings">Settings</button>
  </nav>

  <main id="mainContent"></main>

  <button class="fab" id="fabAdd">+ Log Exercise</button>

  <div class="toast" id="toast"></div>

  <!-- Add/Edit Sheet -->
  <div class="sheet-overlay" id="sheetOverlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title" id="sheetTitle">Log Exercise</div>

      <label class="field-label">Photo (optional)</label>
      <div class="photo-upload">
        <div class="photo-preview" id="photoPreview">📷</div>
        <div class="photo-upload-text">
          Add a reference or form-check photo.
          <button type="button" id="removePhotoBtn" style="display:none;">Remove photo</button>
        </div>
        <input type="file" id="photoInput" accept="image/*">
      </div>

      <label class="field-label">Exercise name</label>
      <input type="text" id="exerciseName" placeholder="e.g. Barbell Squat">

      <label class="field-label">Date</label>
      <input type="date" id="exerciseDate">

      <label class="field-label">Sets (weight × reps)</label>
      <div class="sets-builder" id="setsBuilder"></div>
      <button class="add-set-btn" id="addSetBtn">+ Add set</button>

      <div class="sheet-buttons">
        <button class="btn-cancel" id="cancelBtn">Cancel</button>
        <button class="btn-save" id="saveBtn">Save entry</button>
      </div>
    </div>
  </div>

</div>

<script>
/* ============ STATE ============ */
const STORAGE_KEY = 'ironlog_entries_v1';
let entries = [];
let currentTab = 'log';
let editingId = null;
let tempPhoto = null;
let setRows = [];

/* ============ INIT ============ */
function loadEntries(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    entries = raw ? JSON.parse(raw) : [];
  }catch(e){ entries = []; }
}
function saveEntries(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

function fmtDate(d){
  const dt = new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-US', { day:'2-digit', month:'short', year:'numeric' }).toUpperCase();
}
function todayStr(){
  const d = new Date();
  return d.toISOString().slice(0,10);
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ============ HEADER DATE ============ */
function renderHeaderDate(){
  const d = new Date();
  const dateStr = d.toLocaleDateString('en-US', {weekday:'short', day:'2-digit', month:'short'}).toUpperCase();
  document.getElementById('headerDate').innerHTML = `<b>${entries.length}</b>${dateStr}`;
}

/* ============ TABS ============ */
document.querySelectorAll('nav.tabs button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    document.getElementById('fabAdd').style.display = currentTab==='log' ? 'block' : 'none';
    render();
  });
});

/* ============ RENDER ROUTER ============ */
function render(){
  renderHeaderDate();
  const main = document.getElementById('mainContent');
  if(currentTab==='log') main.innerHTML = renderLogTab();
  else if(currentTab==='history') main.innerHTML = renderHistoryTab();
  else if(currentTab==='progress') main.innerHTML = renderProgressTab();
  else if(currentTab==='settings') main.innerHTML = renderSettingsTab();
  attachDynamicListeners();
}

/* ============ LOG TAB (today's entries) ============ */
function renderLogTab(){
  const today = todayStr();
  const todays = entries.filter(e=>e.date===today).sort((a,b)=>b.created-a.created);
  let html = `<div class="section-label">Today · ${fmtDate(today)}</div>`;
  if(todays.length===0){
    html += `<div class="empty"><b>No sets logged yet</b>Tap "+ Log Exercise" below to record your first lift of the day.</div>`;
  } else {
    html += todays.map(renderEntryCard).join('');
  }
  return html;
}

/* ============ HISTORY TAB ============ */
function renderHistoryTab(){
  let html = `<input class="search-bar" id="historySearch" placeholder="Search by exercise name...">`;
  html += `<div id="historyList"></div>`;
  return html;
}
function renderHistoryList(filter=''){
  const list = document.getElementById('historyList');
  if(!list) return;
  let filtered = entries.slice().sort((a,b)=>b.created-a.created);
  if(filter.trim()){
    filtered = filtered.filter(e=>e.name.toLowerCase().includes(filter.toLowerCase()));
  }
  if(filtered.length===0){
    list.innerHTML = `<div class="empty"><b>Nothing here</b>${filter? 'No exercises match that search.' : 'Your logged workouts will appear here.'}</div>`;
    return;
  }
  // group by date
  const groups = {};
  filtered.forEach(e=>{ (groups[e.date] = groups[e.date]||[]).push(e); });
  const dates = Object.keys(groups).sort((a,b)=> b.localeCompare(a));
  list.innerHTML = dates.map(date=>{
    return `<div class="section-label">${fmtDate(date)}</div>` + groups[date].map(renderEntryCard).join('');
  }).join('');
}

/* ============ ENTRY CARD ============ */
function renderEntryCard(e){
  const totalSets = e.sets.length;
  const maxWeight = Math.max(...e.sets.map(s=>parseFloat(s.weight)||0));
  const photoHtml = e.photo
    ? `<img class="entry-photo" src="${e.photo}" alt="${e.name}">`
    : `<div class="entry-photo placeholder">🏋</div>`;
  const setsHtml = e.sets.map((s,i)=>`
    <div class="set-row">
      <div class="set-num">SET ${i+1}</div>
      <div class="set-val"><b>${s.weight||0}kg</b> × ${s.reps||0} reps</div>
    </div>`).join('');
  return `
    <div class="entry-card" data-id="${e.id}">
      <div class="entry-head" onclick="toggleEntry('${e.id}')">
        ${photoHtml}
        <div class="entry-info">
          <div class="entry-name">${escapeHtml(e.name)}</div>
          <div class="entry-meta"><span><b>${totalSets}</b> sets</span><span><b>${maxWeight}kg</b> top</span></div>
        </div>
        <div class="entry-date">${fmtDate(e.date)}</div>
      </div>
      <div class="entry-detail" id="detail-${e.id}">
        ${setsHtml}
        <div class="entry-actions">
          <button onclick="editEntry('${e.id}')">Edit</button>
          <button class="danger" onclick="deleteEntry('${e.id}')">Delete</button>
        </div>
      </div>
    </div>`;
}
function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function toggleEntry(id){
  const el = document.getElementById('detail-'+id);
  if(el) el.classList.toggle('open');
}

/* ============ PROGRESS TAB ============ */
function renderProgressTab(){
  const names = [...new Set(entries.map(e=>e.name))].sort();
  if(names.length===0){
    return `<div class="section-label">Progress</div><div class="empty"><b>Nothing tracked yet</b>Log a few sessions of the same exercise to see your progress chart.</div>`;
  }
  if(!window._progressPick || !names.includes(window._progressPick)) window._progressPick = names[0];
  const picked = window._progressPick;

  const pickHtml = `<div class="exercise-pick">${names.map(n=>
    `<button class="${n===picked?'active':''}" onclick="setProgressPick('${escapeHtml(n)}')">${escapeHtml(n)}</button>`
  ).join('')}</div>`;

  const relevant = entries.filter(e=>e.name===picked).sort((a,b)=>a.date.localeCompare(b.date));
  const points = relevant.map(e=>({
    date: e.date,
    max: Math.max(...e.sets.map(s=>parseFloat(s.weight)||0)),
    vol: e.sets.reduce((sum,s)=> sum + (parseFloat(s.weight)||0)*(parseFloat(s.reps)||0), 0)
  }));

  const best = Math.max(...points.map(p=>p.max), 0);
  const last = points[points.length-1];
  const first = points[0];
  const change = points.length>1 ? (last.max - first.max) : 0;

  const statsHtml = `
    <div class="progress-stats">
      <div class="stat-box"><span class="num">${best}kg</span><span class="lbl">Best lift</span></div>
      <div class="stat-box"><span class="num">${points.length}</span><span class="lbl">Sessions</span></div>
      <div class="stat-box"><span class="num">${change>=0?'+':''}${change}kg</span><span class="lbl">Change</span></div>
    </div>`;

  const chartHtml = renderChart(points);

  return `<div class="section-label">Progress</div>${pickHtml}${statsHtml}
    <div class="section-label">Top weight per session</div>${chartHtml}`;
}
function setProgressPick(name){
  window._progressPick = name;
  render();
}
function renderChart(points){
  if(points.length===0) return '';
  const w = 320, h = 140, pad = 20;
  const maxVal = Math.max(...points.map(p=>p.max), 1);
  const minVal = Math.min(...points.map(p=>p.max), 0);
  const range = (maxVal-minVal)||1;
  const stepX = points.length>1 ? (w-2*pad)/(points.length-1) : 0;
  const coords = points.map((p,i)=>{
    const x = pad + i*stepX;
    const y = h - pad - ((p.max-minVal)/range)*(h-2*pad);
    return {x,y,p};
  });
  const pathD = coords.map((c,i)=> (i===0?'M':'L')+c.x.toFixed(1)+','+c.y.toFixed(1)).join(' ');
  const areaD = pathD + ` L${coords[coords.length-1].x.toFixed(1)},${h-pad} L${coords[0].x.toFixed(1)},${h-pad} Z`;
  const dots = coords.map(c=>`<circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="3.5" fill="#c2542f" />`).join('');
  return `
    <svg class="chart" viewBox="0 0 ${w} ${h}">
      <line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#34302470" stroke-width="1"/>
      <path d="${areaD}" fill="#c2542f18" stroke="none"/>
      <path d="${pathD}" fill="none" stroke="#c2542f" stroke-width="2"/>
      ${dots}
    </svg>`;
}

/* ============ SETTINGS TAB ============ */
function renderSettingsTab(){
  return `
    <div class="section-label">Backup & Data</div>
    <div class="settings-row">
      <div><div class="lbl">Export backup</div><div class="desc">Save all your data as a file</div></div>
      <button onclick="exportData()">Export</button>
    </div>
    <div class="settings-row">
      <div><div class="lbl">Import backup</div><div class="desc">Restore from a saved file</div></div>
      <button onclick="document.getElementById('importInput').click()">Import</button>
    </div>
    <input type="file" id="importInput" accept="application/json">
    <div class="settings-row">
      <div><div class="lbl">Clear all data</div><div class="desc">Permanently delete all entries</div></div>
      <button onclick="clearAllData()" style="color:#d6483f; border-color:#d6483f40;">Clear</button>
    </div>
    <div class="section-label" style="margin-top:24px;">About</div>
    <div class="empty" style="text-align:left; padding:18px;">
      <b style="margin-bottom:8px;">IRONLOG</b>
      All data is stored only on this device, in your browser. Nothing is uploaded anywhere.
      Export a backup regularly so you never lose your history — especially before clearing browser data or switching phones.
    </div>
  `;
}
function exportData(){
  const blob = new Blob([JSON.stringify(entries, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ironlog-backup-${todayStr()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Backup exported');
}
function clearAllData(){
  if(confirm('This will permanently delete all logged workouts. This cannot be undone. Continue?')){
    entries = [];
    saveEntries();
    showToast('All data cleared');
    render();
  }
}

/* ============ FORM SHEET ============ */
const sheetOverlay = document.getElementById('sheetOverlay');
document.getElementById('fabAdd').addEventListener('click', ()=> openSheet());
document.getElementById('cancelBtn').addEventListener('click', closeSheet);
sheetOverlay.addEventListener('click', (e)=>{ if(e.target===sheetOverlay) closeSheet(); });

function openSheet(entryId=null){
  editingId = entryId;
  tempPhoto = null;
  setRows = [];
  const entry = entryId ? entries.find(e=>e.id===entryId) : null;

  document.getElementById('sheetTitle').textContent = entry ? 'Edit Exercise' : 'Log Exercise';
  document.getElementById('exerciseName').value = entry ? entry.name : '';
  document.getElementById('exerciseDate').value = entry ? entry.date : todayStr();
  tempPhoto = entry ? entry.photo : null;
  renderPhotoPreview();

  setRows = entry ? entry.sets.map(s=>({...s})) : [{weight:'', reps:''}];
  renderSetsBuilder();

  sheetOverlay.classList.add('open');
}
function closeSheet(){
  sheetOverlay.classList.remove('open');
  editingId = null;
}

function renderPhotoPreview(){
  const preview = document.getElementById('photoPreview');
  const removeBtn = document.getElementById('removePhotoBtn');
  if(tempPhoto){
    preview.innerHTML = `<img src="${tempPhoto}">`;
    removeBtn.style.display = 'inline';
  } else {
    preview.innerHTML = '📷';
    removeBtn.style.display = 'none';
  }
}
document.getElementById('photoPreview').addEventListener('click', ()=> document.getElementById('photoInput').click());
document.getElementById('photoInput').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    // downscale to keep storage light
    const img = new Image();
    img.onload = ()=>{
      const canvas = document.createElement('canvas');
      const maxDim = 500;
      let {width, height} = img;
      if(width>height){ if(width>maxDim){ height*=maxDim/width; width=maxDim; } }
      else { if(height>maxDim){ width*=maxDim/height; height=maxDim; } }
      canvas.width=width; canvas.height=height;
      canvas.getContext('2d').drawImage(img,0,0,width,height);
      tempPhoto = canvas.toDataURL('image/jpeg', 0.75);
      renderPhotoPreview();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});
document.getElementById('removePhotoBtn').addEventListener('click', (e)=>{
  e.stopPropagation();
  tempPhoto = null;
  renderPhotoPreview();
});

function renderSetsBuilder(){
  const builder = document.getElementById('setsBuilder');
  builder.innerHTML = setRows.map((s,i)=>`
    <div class="set-builder-row">
      <div class="set-tag">SET ${i+1}</div>
      <input type="number" inputmode="decimal" placeholder="Weight" value="${s.weight}" data-idx="${i}" data-field="weight" class="setInput">
      <div class="unit">kg</div>
      <input type="number" inputmode="numeric" placeholder="Reps" value="${s.reps}" data-idx="${i}" data-field="reps" class="setInput">
      <div class="unit">reps</div>
      <button class="remove-set" onclick="removeSetRow(${i})">×</button>
    </div>
  `).join('');
  document.querySelectorAll('.setInput').forEach(inp=>{
    inp.addEventListener('input', (e)=>{
      const idx = +e.target.dataset.idx;
      const field = e.target.dataset.field;
      setRows[idx][field] = e.target.value;
    });
  });
}
function removeSetRow(idx){
  setRows.splice(idx,1);
  if(setRows.length===0) setRows.push({weight:'', reps:''});
  renderSetsBuilder();
}
document.getElementById('addSetBtn').addEventListener('click', ()=>{
  const last = setRows[setRows.length-1];
  setRows.push({weight: last? last.weight : '', reps: last? last.reps : ''});
  renderSetsBuilder();
});

document.getElementById('saveBtn').addEventListener('click', ()=>{
  const name = document.getElementById('exerciseName').value.trim();
  const date = document.getElementById('exerciseDate').value || todayStr();
  if(!name){ showToast('Enter an exercise name'); return; }
  const validSets = setRows.filter(s=> s.weight!=='' || s.reps!=='');
  if(validSets.length===0){ showToast('Add at least one set'); return; }

  if(editingId){
    const entry = entries.find(e=>e.id===editingId);
    entry.name = name; entry.date = date; entry.sets = validSets; entry.photo = tempPhoto;
  } else {
    entries.push({ id: uid(), name, date, sets: validSets, photo: tempPhoto, created: Date.now() });
  }
  saveEntries();
  closeSheet();
  showToast('Entry saved');
  render();
});

function editEntry(id){ openSheet(id); }
function deleteEntry(id){
  if(confirm('Delete this entry?')){
    entries = entries.filter(e=>e.id!==id);
    saveEntries();
    showToast('Entry deleted');
    render();
  }
}

/* ============ IMPORT ============ */
function attachDynamicListeners(){
  const search = document.getElementById('historySearch');
  if(search){
    search.addEventListener('input', ()=> renderHistoryList(search.value));
    renderHistoryList('');
  }
  const importInput = document.getElementById('importInput');
  if(importInput){
    importInput.addEventListener('change', (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev)=>{
        try{
          const imported = JSON.parse(ev.target.result);
          if(!Array.isArray(imported)) throw new Error('bad format');
          if(confirm(`Import ${imported.length} entries? This will merge with your current data.`)){
            const existingIds = new Set(entries.map(e=>e.id));
            imported.forEach(e=>{ if(!existingIds.has(e.id)) entries.push(e); });
            saveEntries();
            showToast('Backup imported');
            render();
          }
        }catch(err){
          showToast('Invalid backup file');
        }
      };
      reader.readAsText(file);
    });
  }
}

/* ============ SERVICE WORKER ============ */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

/* ============ BOOT ============ */
loadEntries();
render();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>IRONLOG</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16140f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg: #16140f;
    --bg-raised: #1f1c15;
    --bg-card: #211e17;
    --line: #34302470;
    --paper: #f4f1e8;
    --paper-dim: #cfc9b6;
    --rust: #c2542f;
    --rust-dim: #8a3c22;
    --olive: #8a9a5b;
    --warn: #d6483f;
    --radius: 2px;
    --font-display: 'Oswald', 'Arial Narrow', sans-serif;
    --font-body: 'Inter', -apple-system, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; }
  body{
    background: var(--bg);
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, #ffffff03 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, #ffffff02 40px);
    color: var(--paper);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display:flex; flex-direction:column; position:relative; }

  /* ---------- HEADER ---------- */
  header.topbar{
    padding: 18px 20px 14px;
    display:flex; align-items:baseline; justify-content:space-between;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, #1a1812, transparent);
  }
  .brand{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 26px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--paper);
  }
  .brand span{ color: var(--rust); }
  .brand-sub{
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--paper-dim);
    text-transform: uppercase;
    margin-top: 2px;
  }
  .date-stamp{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--paper-dim);
    text-align:right;
    line-height:1.5;
  }
  .date-stamp b{ color: var(--rust); display:block; font-size:13px; }

  /* ---------- NAV ---------- */
  nav.tabs{
    display:flex;
    border-bottom: 1px solid var(--line);
    position: sticky; top:0; z-index:50;
    background: var(--bg);
  }
  nav.tabs button{
    flex:1; padding: 13px 0;
    background:none; border:none;
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--paper-dim);
    border-bottom: 2px solid transparent;
    cursor:pointer;
  }
  nav.tabs button.active{
    color: var(--paper);
    border-bottom-color: var(--rust);
  }

  main{ flex:1; padding: 18px 18px 100px; }

  .section-label{
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--rust);
    margin: 0 0 10px;
    display:flex; align-items:center; gap:8px;
  }
  .section-label::after{ content:''; flex:1; height:1px; background: var(--line); }
  .section-label.with-action{ cursor:default; }
  .section-label .label-action{
    color: var(--olive); cursor:pointer; flex:none; text-transform:uppercase;
  }

  /* ---------- EMPTY STATE ---------- */
  .empty{
    text-align:center;
    padding: 50px 20px;
    color: var(--paper-dim);
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    font-size: 13px;
    line-height:1.6;
  }
  .empty b{ display:block; color: var(--paper); font-family: var(--font-display); font-size:16px; letter-spacing:0.5px; text-transform:uppercase; margin-bottom:6px;}

  /* ---------- ROUTINE CARD (Day 1, Day 2...) ---------- */
  .routine-card{
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    margin-bottom: 14px;
    overflow:hidden;
  }
  .routine-head{
    padding: 14px 16px 10px;
    display:flex; justify-content:space-between; align-items:flex-start;
  }
  .routine-title{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 19px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--paper);
  }
  .routine-meta{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--paper-dim);
    margin-top: 5px;
    line-height:1.5;
  }
  .routine-options{
    background:none; border:none; color: var(--paper-dim);
    font-size: 18px; padding: 2px 6px; cursor:pointer;
  }
  .routine-open-btn{
    display:block; width: calc(100% - 32px); margin: 4px 16px 16px;
    background: var(--rust); color:#1a1209;
    font-family: var(--font-display); font-weight:700; font-size:13px;
    letter-spacing:1.2px; text-transform:uppercase;
    border:none; border-radius: var(--radius); padding: 13px 0;
    cursor:pointer;
  }
  .routine-edit-row{
    display:flex; gap:10px; margin: 4px 16px 16px;
  }
  .routine-edit-row button{
    flex:1; font-family: var(--font-mono); font-size:10px; letter-spacing:1px;
    text-transform:uppercase; padding:9px 0; border-radius: var(--radius);
    border:1px solid var(--line); background: transparent; color: var(--paper-dim); cursor:pointer;
  }
  .routine-edit-row button.danger{ color: var(--warn); border-color:#d6483f40; }

  .new-routine-btn{
    width:100%;
    background: transparent;
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    color: var(--olive);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 14px 0;
    cursor:pointer;
    margin-bottom: 18px;
  }

  /* ---------- ROUTINE DETAIL VIEW ---------- */
  .back-row{
    display:flex; align-items:center; gap:10px; margin-bottom: 14px;
  }
  .back-btn{
    background:none; border:none; color: var(--paper-dim);
    font-size: 20px; cursor:pointer; padding:0 4px;
  }
  .back-title{
    font-family: var(--font-display); font-weight:700; font-size:20px;
    text-transform:uppercase; letter-spacing:0.5px; color: var(--paper);
    flex:1;
  }
  .back-title .sub{
    display:block; font-family: var(--font-mono); font-size:10px;
    letter-spacing:1px; color: var(--paper-dim); margin-top:3px; text-transform:none;
  }

  .exblock{
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-left: 3px solid var(--rust-dim);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow:hidden;
  }
  .exblock-head{
    display:flex; gap:12px; padding: 12px 14px;
    align-items:center;
  }
  .exblock-photo{
    width: 48px; height: 48px; flex-shrink:0;
    border-radius: var(--radius);
    background: var(--bg-raised);
    object-fit: cover;
    border: 1px solid var(--line);
  }
  .exblock-photo.placeholder{
    display:flex; align-items:center; justify-content:center;
    font-size: 18px; color: var(--line);
  }
  .exblock-info{ flex:1; min-width:0; }
  .exblock-name{
    font-family: var(--font-display);
    font-weight:600; font-size: 15px;
    text-transform: uppercase; letter-spacing: 0.3px;
    color: var(--paper);
  }
  .exblock-meta{
    font-family: var(--font-mono); font-size: 10px;
    color: var(--paper-dim); margin-top: 3px;
  }
  .exblock-meta b{ color: var(--olive); }
  .exblock-log-btn{
    background: var(--bg-raised);
    border: 1px solid var(--line);
    color: var(--paper);
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 9px 12px; border-radius: var(--radius);
    cursor:pointer; flex-shrink:0;
  }
  .exblock-history{
    border-top: 1px solid var(--line);
    padding: 10px 14px 12px;
  }
  .exblock-history .hist-empty{
    font-family: var(--font-mono); font-size:11px; color: var(--paper-dim); padding: 4px 0;
  }
  .hist-session{
    margin-bottom: 10px;
  }
  .hist-session:last-child{ margin-bottom:0; }
  .hist-session-date{
    font-family: var(--font-mono); font-size:10px; color: var(--rust);
    letter-spacing:0.5px; margin-bottom:4px;
  }
  .set-row{
    display:flex; align-items:center;
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 5px 0;
    border-bottom: 1px solid #ffffff08;
    color: var(--paper-dim);
  }
  .set-row:last-child{ border-bottom:none; }
  .set-num{ width:46px; color: var(--rust); font-weight:600; }
  .set-val{ flex:1; }
  .set-val b{ color:var(--paper); }
  .hist-actions{ display:flex; gap:8px; margin-top:8px; }
  .hist-actions button{
    font-family: var(--font-mono); font-size:9px; letter-spacing:0.5px; text-transform:uppercase;
    padding: 6px 10px; border-radius: var(--radius); border:1px solid var(--line);
    background:transparent; color: var(--paper-dim); cursor:pointer;
  }
  .hist-actions button.danger{ color: var(--warn); border-color:#d6483f40; }

  .add-ex-to-routine-btn{
    width:100%;
    background: transparent;
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    color: var(--olive);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 14px 0;
    cursor:pointer;
  }

  /* ---------- FAB ---------- */
  .fab{
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    width: min(444px, calc(100% - 36px));
    background: var(--rust);
    color: #1a1209;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-align:center;
    padding: 16px 0;
    border-radius: var(--radius);
    border: none;
    box-shadow: 0 8px 24px #0008, 0 0 0 1px #00000030;
    cursor:pointer;
    z-index: 60;
    display:none;
  }
  .fab:active{ transform: translateX(-50%) scale(0.98); }

  /* ---------- SHEETS (shared) ---------- */
  .sheet-overlay{
    position: fixed; inset:0;
    background: #0a0905d0;
    z-index: 100;
    display:none;
    align-items:flex-end;
    backdrop-filter: blur(2px);
  }
  .sheet-overlay.open{ display:flex; }
  .sheet{
    background: var(--bg-raised);
    border-top: 1px solid var(--line);
    border-radius: 16px 16px 0 0;
    width:100%;
    max-width: 480px;
    margin: 0 auto;
    max-height: 92vh;
    overflow-y:auto;
    padding: 8px 20px 28px;
    animation: slideUp 0.25s ease-out;
  }
  @keyframes slideUp{ from{ transform: translateY(40px); opacity:0;} to{ transform:translateY(0); opacity:1;} }
  .sheet-handle{ width:36px; height:4px; background: var(--line); border-radius:4px; margin: 10px auto 18px; }
  .sheet-title{
    font-family: var(--font-display);
    font-size: 20px; text-transform:uppercase; letter-spacing:0.5px;
    margin-bottom: 18px; color: var(--paper);
  }

  label.field-label{
    display:block;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--paper-dim);
    margin: 16px 0 7px;
  }
  input[type=text], input[type=number], input[type=date]{
    width:100%;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--paper);
    font-family: var(--font-body);
    font-size: 15px;
    padding: 12px 12px;
  }
  input:focus{ outline: 1px solid var(--rust); border-color: var(--rust); }

  /* photo upload */
  .photo-upload{
    display:flex; align-items:center; gap:14px;
    margin-top: 6px;
  }
  .photo-preview{
    width: 72px; height:72px;
    border-radius: var(--radius);
    border: 1px dashed var(--line);
    background: var(--bg-card);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; flex-shrink:0;
    color: var(--paper-dim);
    font-size: 22px;
    cursor:pointer;
  }
  .photo-preview img{ width:100%; height:100%; object-fit:cover; }
  .photo-upload-text{
    font-size: 12px; color: var(--paper-dim); line-height:1.5;
  }
  .photo-upload-text button{
    background:none; border:none; color: var(--rust);
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing:1px; text-transform:uppercase;
    padding:0; margin-top:4px; cursor:pointer;
  }

  /* sets builder */
  .sets-builder{ margin-top: 6px; }
  .set-builder-row{
    display:flex; align-items:center; gap:8px;
    margin-bottom: 8px;
  }
  .set-builder-row .set-tag{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--rust);
    width: 38px;
    flex-shrink:0;
  }
  .set-builder-row input{ flex:1; padding: 10px; font-size:14px; }
  .set-builder-row .unit{
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--paper-dim);
    width: 30px;
  }
  .set-builder-row .remove-set{
    background:none; border:none; color: var(--paper-dim);
    font-size: 18px; padding: 0 4px; cursor:pointer; flex-shrink:0;
  }
  .add-set-btn{
    width:100%;
    background: transparent;
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    color: var(--olive);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 11px 0;
    cursor:pointer;
    margin-top: 4px;
  }

  .sheet-buttons{ display:flex; gap:10px; margin-top: 22px; }
  .sheet-buttons button{
    flex:1;
    font-family: var(--font-display);
    font-weight:600;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 14px 0;
    border-radius: var(--radius);
    border: none;
    cursor:pointer;
  }
  .btn-save{ background: var(--rust); color:#1a1209; }
  .btn-cancel{ background: transparent; color: var(--paper-dim); border: 1px solid var(--line) !important; }

  .hint-text{
    font-family: var(--font-mono); font-size: 11px; color: var(--paper-dim);
    line-height:1.5; margin-top: 4px;
  }

  /* ---------- HISTORY ---------- */
  .search-bar{
    width:100%;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--paper);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 11px 12px;
    margin-bottom: 16px;
  }

  /* ---------- PROGRESS ---------- */
  .exercise-pick{
    display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px;
  }
  .exercise-pick button{
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 8px 12px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--paper-dim);
    cursor:pointer;
  }
  .exercise-pick button.active{
    color: var(--bg); background: var(--olive); border-color: var(--olive);
  }
  .progress-stats{
    display:flex; gap:10px; margin-bottom: 18px;
  }
  .stat-box{
    flex:1;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px;
    text-align:center;
  }
  .stat-box .num{
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--rust);
    display:block;
  }
  .stat-box .lbl{
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--paper-dim);
    text-transform: uppercase;
    margin-top: 3px;
  }
  svg.chart{ width:100%; height: 160px; overflow: visible; }

  /* ---------- SETTINGS / BACKUP ---------- */
  .settings-row{
    display:flex; justify-content:space-between; align-items:center;
    padding: 14px 0;
    border-bottom: 1px solid var(--line);
  }
  .settings-row .lbl{ font-size: 14px; color: var(--paper); }
  .settings-row .desc{ font-size: 11px; color: var(--paper-dim); margin-top:2px; }
  .settings-row button{
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--bg-card);
    border: 1px solid var(--line);
    color: var(--paper);
    padding: 9px 14px;
    border-radius: var(--radius);
    cursor:pointer;
    white-space:nowrap;
  }
  input[type=file]{ display:none; }

  .toast{
    position: fixed; bottom: 100px; left:50%; transform: translateX(-50%);
    background: var(--paper); color: #1a1812;
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 10px 18px;
    border-radius: var(--radius);
    z-index: 200;
    opacity:0; pointer-events:none;
    transition: opacity 0.25s, transform 0.25s;
    max-width: 80%;
    text-align:center;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(-6px); }

  /* context menu */
  .ctx-menu{
    position: absolute;
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    z-index: 150;
    min-width: 140px;
    box-shadow: 0 8px 24px #0008;
    display:none;
  }
  .ctx-menu.open{ display:block; }
  .ctx-menu button{
    display:block; width:100%; text-align:left;
    background:none; border:none; color: var(--paper);
    font-family: var(--font-mono); font-size: 11px; letter-spacing:0.5px;
    text-transform:uppercase; padding: 11px 14px; cursor:pointer;
  }
  .ctx-menu button:hover{ background: var(--bg-card); }
  .ctx-menu button.danger{ color: var(--warn); }

  ::-webkit-scrollbar{ width:0; height:0; }
</style>
</head>
<body>
<div id="app">

  <header class="topbar">
    <div>
      <div class="brand">IRON<span>LOG</span></div>
      <div class="brand-sub">personal training ledger</div>
    </div>
    <div class="date-stamp" id="headerDate"></div>
  </header>

  <nav class="tabs">
    <button data-tab="routines" class="active">Routines</button>
    <button data-tab="history">History</button>
    <button data-tab="progress">Progress</button>
    <button data-tab="settings">Settings</button>
  </nav>

  <main id="mainContent"></main>

  <button class="fab" id="fabAdd">+ New Routine</button>

  <div class="toast" id="toast"></div>
  <div class="ctx-menu" id="ctxMenu"></div>

  <!-- Routine create/rename sheet -->
  <div class="sheet-overlay" id="routineSheetOverlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title" id="routineSheetTitle">New Routine</div>
      <label class="field-label">Routine name</label>
      <input type="text" id="routineNameInput" placeholder="e.g. Day 1, Push Day, Leg Day">
      <div class="sheet-buttons">
        <button class="btn-cancel" id="routineCancelBtn">Cancel</button>
        <button class="btn-save" id="routineSaveBtn">Save</button>
      </div>
    </div>
  </div>

  <!-- Add exercise to routine (name only, no sets yet) -->
  <div class="sheet-overlay" id="addExOverlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Add Exercise</div>
      <label class="field-label">Exercise name</label>
      <input type="text" id="addExName" placeholder="e.g. Barbell Squat">
      <div class="hint-text">This adds the exercise to the routine. You'll log photo, sets, and weight separately each time you train.</div>
      <div class="sheet-buttons">
        <button class="btn-cancel" id="addExCancelBtn">Cancel</button>
        <button class="btn-save" id="addExSaveBtn">Add to routine</button>
      </div>
    </div>
  </div>

  <!-- Log a session for an exercise (photo + sets + weight) -->
  <div class="sheet-overlay" id="logSheetOverlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title" id="logSheetTitle">Log Set</div>

      <label class="field-label">Photo (optional)</label>
      <div class="photo-upload">
        <div class="photo-preview" id="photoPreview">📷</div>
        <div class="photo-upload-text">
          Add a reference or form-check photo.
          <button type="button" id="removePhotoBtn" style="display:none;">Remove photo</button>
        </div>
        <input type="file" id="photoInput" accept="image/*">
      </div>

      <label class="field-label">Date</label>
      <input type="date" id="logDate">

      <label class="field-label">Sets (weight × reps)</label>
      <div class="sets-builder" id="setsBuilder"></div>
      <button class="add-set-btn" id="addSetBtn">+ Add set</button>

      <div class="sheet-buttons">
        <button class="btn-cancel" id="logCancelBtn">Cancel</button>
        <button class="btn-save" id="logSaveBtn">Save log</button>
      </div>
    </div>
  </div>

</div>

<script>
/* ============ STATE ============
  routines: [{ id, name, exercises: [{ id, name }] }]
  logs: [{ id, routineId, exerciseId, exerciseName, date, sets:[{weight,reps}], photo, created }]
*/
const ROUTINES_KEY = 'ironlog_routines_v2';
const LOGS_KEY = 'ironlog_logs_v2';
const MIGRATED_KEY = 'ironlog_migrated_v2';

let routines = [];
let logs = [];
let currentTab = 'routines';
let viewingRoutineId = null; // null = list view, else detail view

let editingRoutineId = null;
let activeRoutineForAddEx = null;

let logContext = null; // { routineId, exerciseId, exerciseName, editingLogId }
let tempPhoto = null;
let setRows = [];

/* ============ MIGRATION FROM v1 ============ */
function migrateOldData(){
  if(localStorage.getItem(MIGRATED_KEY)) return;
  try{
    const oldRaw = localStorage.getItem('ironlog_entries_v1');
    if(oldRaw){
      const oldEntries = JSON.parse(oldRaw);
      if(Array.isArray(oldEntries) && oldEntries.length){
        const miscRoutine = { id: uid(), name: 'Imported', exercises: [] };
        const nameToExId = {};
        oldEntries.forEach(e=>{
          if(!nameToExId[e.name]){
            const exId = uid();
            nameToExId[e.name] = exId;
            miscRoutine.exercises.push({ id: exId, name: e.name });
          }
          logs.push({
            id: e.id || uid(),
            routineId: miscRoutine.id,
            exerciseId: nameToExId[e.name],
            exerciseName: e.name,
            date: e.date,
            sets: e.sets,
            photo: e.photo || null,
            created: e.created || Date.now()
          });
        });
        routines.push(miscRoutine);
        saveRoutines(); saveLogs();
      }
    }
  }catch(err){ /* ignore */ }
  localStorage.setItem(MIGRATED_KEY, '1');
}

/* ============ PERSISTENCE ============ */
function loadAll(){
  try{ routines = JSON.parse(localStorage.getItem(ROUTINES_KEY) || '[]'); }catch(e){ routines = []; }
  try{ logs = JSON.parse(localStorage.getItem(LOGS_KEY) || '[]'); }catch(e){ logs = []; }
  migrateOldData();
}
function saveRoutines(){ localStorage.setItem(ROUTINES_KEY, JSON.stringify(routines)); }
function saveLogs(){ localStorage.setItem(LOGS_KEY, JSON.stringify(logs)); }

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function fmtDate(d){
  const dt = new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-US', { day:'2-digit', month:'short', year:'numeric' }).toUpperCase();
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}
function getRoutine(id){ return routines.find(r=>r.id===id); }
function getExercise(routine, exId){ return routine ? routine.exercises.find(e=>e.id===exId) : null; }
function logsFor(routineId, exerciseId){
  return logs.filter(l=>l.routineId===routineId && l.exerciseId===exerciseId).sort((a,b)=>b.created-a.created);
}

/* ============ HEADER ============ */
function renderHeaderDate(){
  const d = new Date();
  const dateStr = d.toLocaleDateString('en-US', {weekday:'short', day:'2-digit', month:'short'}).toUpperCase();
  document.getElementById('headerDate').innerHTML = `<b>${logs.length}</b>${dateStr}`;
}

/* ============ TABS ============ */
document.querySelectorAll('nav.tabs button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    viewingRoutineId = null;
    render();
  });
});

/* ============ RENDER ROUTER ============ */
function render(){
  renderHeaderDate();
  const main = document.getElementById('mainContent');
  const fab = document.getElementById('fabAdd');

  if(currentTab==='routines'){
    if(viewingRoutineId){
      main.innerHTML = renderRoutineDetail(viewingRoutineId);
      fab.style.display = 'none';
    } else {
      main.innerHTML = renderRoutinesList();
      fab.style.display = 'block';
      fab.textContent = '+ New Routine';
    }
  } else if(currentTab==='history'){
    main.innerHTML = renderHistoryTab();
    fab.style.display = 'none';
  } else if(currentTab==='progress'){
    main.innerHTML = renderProgressTab();
    fab.style.display = 'none';
  } else if(currentTab==='settings'){
    main.innerHTML = renderSettingsTab();
    fab.style.display = 'none';
  }
  attachDynamicListeners();
}

/* ============ ROUTINES LIST ============ */
function renderRoutinesList(){
  let html = `<div class="section-label">Your Routines</div>`;
  if(routines.length===0){
    html += `<div class="empty"><b>No routines yet</b>Create one for each training day — like "Day 1" or "Push Day" — then add the exercises that belong to it.</div>`;
    return html;
  }
  html += routines.map(r=>{
    const exCount = r.exercises.length;
    const names = r.exercises.slice(0,4).map(e=>e.name).join(', ');
    const more = exCount > 4 ? `, +${exCount-4} more` : '';
    return `
      <div class="routine-card">
        <div class="routine-head">
          <div>
            <div class="routine-title">${escapeHtml(r.name)}</div>
            <div class="routine-meta">${exCount} exercise${exCount!==1?'s':''}${exCount? ' · '+escapeHtml(names)+more : ''}</div>
          </div>
          <button class="routine-options" onclick="openRoutineCtx(event, '${r.id}')">⋯</button>
        </div>
        <button class="routine-open-btn" onclick="openRoutine('${r.id}')">Open Routine</button>
      </div>`;
  }).join('');
  return html;
}

function openRoutine(id){
  viewingRoutineId = id;
  render();
}

/* ============ ROUTINE DETAIL ============ */
function renderRoutineDetail(id){
  const r = getRoutine(id);
  if(!r){ viewingRoutineId = null; return renderRoutinesList(); }

  let html = `
    <div class="back-row">
      <button class="back-btn" onclick="backToRoutines()">←</button>
      <div class="back-title">${escapeHtml(r.name)}<span class="sub">${r.exercises.length} exercise${r.exercises.length!==1?'s':''}</span></div>
      <button class="routine-options" onclick="openRoutineCtx(event, '${r.id}')">⋯</button>
    </div>`;

  if(r.exercises.length===0){
    html += `<div class="empty"><b>No exercises yet</b>Add the exercises that make up this routine below.</div>`;
  } else {
    html += r.exercises.map(ex=>{
      const exLogs = logsFor(r.id, ex.id);
      const latest = exLogs[0];
      const latestPhoto = latest && latest.photo
        ? `<img class="exblock-photo" src="${latest.photo}">`
        : `<div class="exblock-photo placeholder">🏋</div>`;
      const metaText = exLogs.length
        ? `Last: ${fmtDate(latest.date)} · <b>${exLogs.length}</b> session${exLogs.length!==1?'s':''}`
        : `Not logged yet`;

      const historyHtml = exLogs.length === 0
        ? `<div class="hist-empty">No sessions logged for this exercise yet.</div>`
        : exLogs.slice(0,5).map(l=>`
          <div class="hist-session">
            <div class="hist-session-date">${fmtDate(l.date)}</div>
            ${l.sets.map((s,i)=>`
              <div class="set-row">
                <div class="set-num">SET ${i+1}</div>
                <div class="set-val"><b>${s.weight||0}kg</b> × ${s.reps||0} reps</div>
              </div>`).join('')}
            <div class="hist-actions">
              <button onclick="editLog('${l.id}')">Edit</button>
              <button class="danger" onclick="deleteLog('${l.id}')">Delete</button>
            </div>
          </div>`).join('');

      return `
        <div class="exblock" data-exid="${ex.id}">
          <div class="exblock-head">
            ${latestPhoto}
            <div class="exblock-info">
              <div class="exblock-name">${escapeHtml(ex.name)}</div>
              <div class="exblock-meta">${metaText}</div>
            </div>
            <button class="exblock-log-btn" onclick="openLogSheet('${r.id}','${ex.id}','${escapeHtml(ex.name).replace(/'/g,"\\'")}')">+ Log</button>
          </div>
          <div class="exblock-history">${historyHtml}</div>
        </div>`;
    }).join('');
  }

  html += `<button class="add-ex-to-routine-btn" onclick="openAddExSheet('${r.id}')">+ Add exercise to this routine</button>`;
  return html;
}

function backToRoutines(){
  viewingRoutineId = null;
  render();
}

/* ============ CONTEXT MENU (routine ⋯) ============ */
function openRoutineCtx(evt, routineId){
  evt.stopPropagation();
  const menu = document.getElementById('ctxMenu');
  menu.innerHTML = `
    <button onclick="renameRoutinePrompt('${routineId}')">Rename</button>
    <button class="danger" onclick="deleteRoutine('${routineId}')">Delete routine</button>
  `;
  const rect = evt.target.getBoundingClientRect();
  menu.style.top = (window.scrollY + rect.bottom + 4) + 'px';
  menu.style.left = Math.min(rect.left, window.innerWidth - 160) + 'px';
  menu.classList.add('open');
  setTimeout(()=>{
    document.addEventListener('click', closeCtxOnce, { once:true });
  }, 0);
}
function closeCtxOnce(){ document.getElementById('ctxMenu').classList.remove('open'); }

function renameRoutinePrompt(routineId){
  closeCtxOnce();
  editingRoutineId = routineId;
  const r = getRoutine(routineId);
  document.getElementById('routineSheetTitle').textContent = 'Rename Routine';
  document.getElementById('routineNameInput').value = r ? r.name : '';
  document.getElementById('routineSheetOverlay').classList.add('open');
}
function deleteRoutine(routineId){
  closeCtxOnce();
  const r = getRoutine(routineId);
  if(confirm(`Delete "${r.name}" and all its logged history? This cannot be undone.`)){
    routines = routines.filter(r=>r.id!==routineId);
    logs = logs.filter(l=>l.routineId!==routineId);
    saveRoutines(); saveLogs();
    if(viewingRoutineId===routineId) viewingRoutineId = null;
    showToast('Routine deleted');
    render();
  }
}

/* ============ NEW ROUTINE SHEET ============ */
document.getElementById('fabAdd').addEventListener('click', ()=>{
  if(currentTab==='routines' && !viewingRoutineId){
    editingRoutineId = null;
    document.getElementById('routineSheetTitle').textContent = 'New Routine';
    document.getElementById('routineNameInput').value = '';
    document.getElementById('routineSheetOverlay').classList.add('open');
  }
});
document.getElementById('routineCancelBtn').addEventListener('click', ()=>{
  document.getElementById('routineSheetOverlay').classList.remove('open');
});
document.getElementById('routineSaveBtn').addEventListener('click', ()=>{
  const name = document.getElementById('routineNameInput').value.trim();
  if(!name){ showToast('Enter a routine name'); return; }
  if(editingRoutineId){
    const r = getRoutine(editingRoutineId);
    r.name = name;
    showToast('Routine renamed');
  } else {
    routines.push({ id: uid(), name, exercises: [] });
    showToast('Routine created');
  }
  saveRoutines();
  document.getElementById('routineSheetOverlay').classList.remove('open');
  render();
});
document.getElementById('routineSheetOverlay').addEventListener('click', (e)=>{
  if(e.target.id==='routineSheetOverlay') e.currentTarget.classList.remove('open');
});

/* ============ ADD EXERCISE TO ROUTINE SHEET ============ */
function openAddExSheet(routineId){
  activeRoutineForAddEx = routineId;
  document.getElementById('addExName').value = '';
  document.getElementById('addExOverlay').classList.add('open');
}
document.getElementById('addExCancelBtn').addEventListener('click', ()=>{
  document.getElementById('addExOverlay').classList.remove('open');
});
document.getElementById('addExSaveBtn').addEventListener('click', ()=>{
  const name = document.getElementById('addExName').value.trim();
  if(!name){ showToast('Enter an exercise name'); return; }

  if(r){
    r.exercises.push({ id: uid(), name });
    saveRoutines();

  }

document.getElementById('addExOverlay').addEventListener('click', (e)=>{
  if(e.target.id==='addExOverlay') e.currentTarget.classList.remove('open');
});

/* ============ LOG SHEET (photo + sets + weight) ============ */
function openLogSheet(routineId, exerciseId, exerciseName, editingLogId=null){
  logContext = { routineId, exerciseId, exerciseName, editingLogId };
  tempPhoto = null;
  setRows = [{weight:'', reps:''}];

  const log = editingLogId ? logs.find(l=>l.id===editingLogId) : null;

  document.getElementById('logSheetTitle').textContent = (editingLogId? 'Edit Log — ' : 'Log — ') + exerciseName;
  document.getElementById('logDate').value = log ? log.date : todayStr();
  tempPhoto = log ? log.photo : null;
  renderPhotoPreview();
  setRows = log ? log.sets.map(s=>({...s})) : [{weight:'', reps:''}];
  renderSetsBuilder();

  document.getElementById('logSheetOverlay').classList.add('open');
}
document.getElementById('logCancelBtn').addEventListener('click', ()=>{
  document.getElementById('logSheetOverlay').classList.remove('open');
});
document.getElementById('logSheetOverlay').addEventListener('click', (e)=>{
  if(e.target.id==='logSheetOverlay') e.currentTarget.classList.remove('open');
});

function renderPhotoPreview(){
  const preview = document.getElementById('photoPreview');
  const removeBtn = document.getElementById('removePhotoBtn');
  if(tempPhoto){
    preview.innerHTML = `<img src="${tempPhoto}">`;
    removeBtn.style.display = 'inline';
  } else {
    preview.innerHTML = '📷';
    removeBtn.style.display = 'none';
  }
}
document.getElementById('photoPreview').addEventListener('click', ()=> document.getElementById('photoInput').click());
document.getElementById('photoInput').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    const img = new Image();
    img.onload = ()=>{
      const canvas = document.createElement('canvas');
      const maxDim = 500;
      let {width, height} = img;
      if(width>height){ if(width>maxDim){ height*=maxDim/width; width=maxDim; } }
      else { if(height>maxDim){ width*=maxDim/height; height=maxDim; } }
      canvas.width=width; canvas.height=height;
      canvas.getContext('2d').drawImage(img,0,0,width,height);
      tempPhoto = canvas.toDataURL('image/jpeg', 0.75);
      renderPhotoPreview();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});
document.getElementById('removePhotoBtn').addEventListener('click', (e)=>{
  e.stopPropagation();
  tempPhoto = null;
  renderPhotoPreview();
});

function renderSetsBuilder(){
  const builder = document.getElementById('setsBuilder');
  builder.innerHTML = setRows.map((s,i)=>`
    <div class="set-builder-row">
      <div class="set-tag">SET ${i+1}</div>
      <input type="number" inputmode="decimal" placeholder="Weight" value="${s.weight}" data-idx="${i}" data-field="weight" class="setInput">
      <div class="unit">kg</div>
      <input type="number" inputmode="numeric" placeholder="Reps" value="${s.reps}" data-idx="${i}" data-field="reps" class="setInput">
      <div class="unit">reps</div>
      <button class="remove-set" onclick="removeSetRow(${i})">×</button>
    </div>
  `).join('');
  document.querySelectorAll('.setInput').forEach(inp=>{
    inp.addEventListener('input', (e)=>{
      const idx = +e.target.dataset.idx;
      const field = e.target.dataset.field;
      setRows[idx][field] = e.target.value;
    });
  });
}
function removeSetRow(idx){
  setRows.splice(idx,1);
  if(setRows.length===0) setRows.push({weight:'', reps:''});
  renderSetsBuilder();
}
document.getElementById('addSetBtn').addEventListener('click', ()=>{
  const last = setRows[setRows.length-1];
  setRows.push({weight: last? last.weight : '', reps: last? last.reps : ''});
  renderSetsBuilder();
});

document.getElementById('logSaveBtn').addEventListener('click', ()=>{
  const date = document.getElementById('logDate').value || todayStr();
  const validSets = setRows.filter(s=> s.weight!=='' || s.reps!=='');
  if(validSets.length===0){ showToast('Add at least one set'); return; }

  if(logContext.editingLogId){
    const log = logs.find(l=>l.id===logContext.editingLogId);
    log.date = date; log.sets = validSets; log.photo = tempPhoto;
  } else {
    logs.push({
      id: uid(),
      routineId: logContext.routineId,
      exerciseId: logContext.exerciseId,
      exerciseName: logContext.exerciseName,
      date, sets: validSets, photo: tempPhoto,
      created: Date.now()
    });
  }
  saveLogs();
  document.getElementById('logSheetOverlay').classList.remove('open');
  showToast('Logged');
  render();
});

function editLog(logId){
  const log = logs.find(l=>l.id===logId);
  if(!log) return;
  openLogSheet(log.routineId, log.exerciseId, log.exerciseName, logId);
}
function deleteLog(logId){
  if(confirm('Delete this logged session?')){
    logs = logs.filter(l=>l.id!==logId);
    saveLogs();
    showToast('Log deleted');
    render();
  }
}

/* ============ HISTORY TAB (all logs, across routines) ============ */
function renderHistoryTab(){
  let html = `<input class="search-bar" id="historySearch" placeholder="Search by exercise name...">`;
  html += `<div id="historyList"></div>`;
  return html;
}
function renderHistoryList(filter=''){
  const list = document.getElementById('historyList');
  if(!list) return;
  let filtered = logs.slice().sort((a,b)=>b.created-a.created);
  if(filter.trim()){
    filtered = filtered.filter(l=>l.exerciseName.toLowerCase().includes(filter.toLowerCase()));
  }
  if(filtered.length===0){
    list.innerHTML = `<div class="empty"><b>Nothing here</b>${filter? 'No exercises match that search.' : 'Your logged sessions will appear here once you start training.'}</div>`;
    return;
  }
  const groups = {};
  filtered.forEach(l=>{ (groups[l.date] = groups[l.date]||[]).push(l); });
  const dates = Object.keys(groups).sort((a,b)=> b.localeCompare(a));
  list.innerHTML = dates.map(date=>{
    return `<div class="section-label">${fmtDate(date)}</div>` + groups[date].map(l=>{
      const r = getRoutine(l.routineId);
      const routineName = r ? r.name : 'Deleted routine';
      const photoHtml = l.photo
        ? `<img class="exblock-photo" src="${l.photo}">`
        : `<div class="exblock-photo placeholder">🏋</div>`;
      const maxWeight = Math.max(...l.sets.map(s=>parseFloat(s.weight)||0));
      return `
        <div class="exblock">
          <div class="exblock-head" style="cursor:pointer;" onclick="toggleHistEntry('${l.id}')">
            ${photoHtml}
            <div class="exblock-info">
              <div class="exblock-name">${escapeHtml(l.exerciseName)}</div>
              <div class="exblock-meta"><b>${routineName}</b> · ${l.sets.length} sets · <b>${maxWeight}kg</b> top</div>
            </div>
          </div>
          <div class="exblock-history" id="histdet-${l.id}" style="display:none;">
            ${l.sets.map((s,i)=>`
              <div class="set-row">
                <div class="set-num">SET ${i+1}</div>
                <div class="set-val"><b>${s.weight||0}kg</b> × ${s.reps||0} reps</div>
              </div>`).join('')}
            <div class="hist-actions">
              <button onclick="editLog('${l.id}')">Edit</button>
              <button class="danger" onclick="deleteLog('${l.id}')">Delete</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }).join('');
}
function toggleHistEntry(logId){
  const el = document.getElementById('histdet-'+logId);
  if(el) el.style.display = el.style.display==='none' ? 'block' : 'none';
}

/* ============ PROGRESS TAB ============ */
function renderProgressTab(){
  const names = [...new Set(logs.map(l=>l.exerciseName))].sort();
  if(names.length===0){
    return `<div class="section-label">Progress</div><div class="empty"><b>Nothing tracked yet</b>Log a few sessions of the same exercise to see your progress chart.</div>`;
  }
  if(!window._progressPick || !names.includes(window._progressPick)) window._progressPick = names[0];
  const picked = window._progressPick;

  const pickHtml = `<div class="exercise-pick">${names.map(n=>
    `<button class="${n===picked?'active':''}" onclick="setProgressPick('${escapeHtml(n).replace(/'/g,"\\'")}')">${escapeHtml(n)}</button>`
  ).join('')}</div>`;

  const relevant = logs.filter(l=>l.exerciseName===picked).sort((a,b)=>a.date.localeCompare(b.date));
  const points = relevant.map(l=>({
    date: l.date,
    max: Math.max(...l.sets.map(s=>parseFloat(s.weight)||0))
  }));

  const best = Math.max(...points.map(p=>p.max), 0);
  const last = points[points.length-1];
  const first = points[0];
  const change = points.length>1 ? (last.max - first.max) : 0;

  const statsHtml = `
    <div class="progress-stats">
      <div class="stat-box"><span class="num">${best}kg</span><span class="lbl">Best lift</span></div>
      <div class="stat-box"><span class="num">${points.length}</span><span class="lbl">Sessions</span></div>
      <div class="stat-box"><span class="num">${change>=0?'+':''}${change}kg</span><span class="lbl">Change</span></div>
    </div>`;

  const chartHtml = renderChart(points);

  return `<div class="section-label">Progress</div>${pickHtml}${statsHtml}
    <div class="section-label">Top weight per session</div>${chartHtml}`;
}
function setProgressPick(name){
  window._progressPick = name;
  render();
}
function renderChart(points){
  if(points.length===0) return '';
  const w = 320, h = 140, pad = 20;
  const maxVal = Math.max(...points.map(p=>p.max), 1);
  const minVal = Math.min(...points.map(p=>p.max), 0);
  const range = (maxVal-minVal)||1;
  const stepX = points.length>1 ? (w-2*pad)/(points.length-1) : 0;
  const coords = points.map((p,i)=>{
    const x = pad + i*stepX;
    const y = h - pad - ((p.max-minVal)/range)*(h-2*pad);
    return {x,y,p};
  });
  const pathD = coords.map((c,i)=> (i===0?'M':'L')+c.x.toFixed(1)+','+c.y.toFixed(1)).join(' ');
  const areaD = pathD + ` L${coords[coords.length-1].x.toFixed(1)},${h-pad} L${coords[0].x.toFixed(1)},${h-pad} Z`;
  const dots = coords.map(c=>`<circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="3.5" fill="#c2542f" />`).join('');
  return `
    <svg class="chart" viewBox="0 0 ${w} ${h}">
      <line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#34302470" stroke-width="1"/>
      <path d="${areaD}" fill="#c2542f18" stroke="none"/>
      <path d="${pathD}" fill="none" stroke="#c2542f" stroke-width="2"/>
      ${dots}
    </svg>`;
}

/* ============ SETTINGS TAB ============ */
function renderSettingsTab(){
  return `
    <div class="section-label">Backup & Data</div>
    <div class="settings-row">
      <div><div class="lbl">Export backup</div><div class="desc">Save all routines and logs as a file</div></div>
      <button onclick="exportData()">Export</button>
    </div>
    <div class="settings-row">
      <div><div class="lbl">Import backup</div><div class="desc">Restore from a saved file</div></div>
      <button onclick="document.getElementById('importInput').click()">Import</button>
    </div>
    <input type="file" id="importInput" accept="application/json">
    <div class="settings-row">
      <div><div class="lbl">Clear all data</div><div class="desc">Permanently delete all routines and logs</div></div>
      <button onclick="clearAllData()" style="color:#d6483f; border-color:#d6483f40;">Clear</button>
    </div>
    <div class="section-label" style="margin-top:24px;">About</div>
    <div class="empty" style="text-align:left; padding:18px;">
      <b style="margin-bottom:8px;">IRONLOG</b>
      All data is stored only on this device, in your browser. Nothing is uploaded anywhere.
      Export a backup regularly so you never lose your history — especially before clearing browser data or switching phones.
    </div>
  `;
}
function exportData(){
  const payload = { routines, logs, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ironlog-backup-${todayStr()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Backup exported');
}
function clearAllData(){
  if(confirm('This will permanently delete all routines and logged history. This cannot be undone. Continue?')){
    routines = []; logs = [];
    saveRoutines(); saveLogs();
    viewingRoutineId = null;
    showToast('All data cleared');
    render();
  }
}

/* ============ IMPORT ============ */
function attachDynamicListeners(){
  const search = document.getElementById('historySearch');
  if(search){
    search.addEventListener('input', ()=> renderHistoryList(search.value));
    renderHistoryList('');
  }
  const importInput = document.getElementById('importInput');
  if(importInput){
    importInput.addEventListener('change', (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev)=>{
        try{
          const imported = JSON.parse(ev.target.result);
          let importedRoutines = [], importedLogs = [];
          if(Array.isArray(imported)){
            // old v1 format fallback - skip, not compatible structure-wise
            showToast('Old backup format not supported here');
            return;
          } else if(imported.routines && imported.logs){
            importedRoutines = imported.routines;
            importedLogs = imported.logs;
          } else {
            throw new Error('bad format');
          }
          if(confirm(`Import ${importedRoutines.length} routines and ${importedLogs.length} logs? This will merge with your current data.`)){
            const existingRoutineIds = new Set(routines.map(r=>r.id));
            importedRoutines.forEach(r=>{ if(!existingRoutineIds.has(r.id)) routines.push(r); });
            const existingLogIds = new Set(logs.map(l=>l.id));
            importedLogs.forEach(l=>{ if(!existingLogIds.has(l.id)) logs.push(l); });
            saveRoutines(); saveLogs();
            showToast('Backup imported');
            render();
          }
        }catch(err){
          showToast('Invalid backup file');
        }
      };
      reader.readAsText(file);
    });
  }
}

/* ============ SERVICE WORKER ============ */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

/* ============ BOOT ============ */
loadAll();
render();
</script>
